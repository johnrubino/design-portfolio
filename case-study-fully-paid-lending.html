<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study: Fully Paid Lending | John Rubino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #141414;
            --secondary-bg: #1a1a1a;
            --surface-bg: #2a2a2a;
            --border-color: #3a3a3a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-orange: #FF8C42;
            --accent-purple: #667eea;
        }

        [data-theme="light"] {
            --primary-bg: #ffffff;
            --secondary-bg: #f5f5f7;
            --surface-bg: #e8e8ea;
            --border-color: #d1d1d6;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-orange: #FF8C42;
            --accent-purple: #667eea;
        }

        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            padding: 80px 40px;
            max-width: 1200px;
            margin: 0 auto;
            transition: background 300ms ease, color 300ms ease;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 24px;
        }

        p {
            font-size: 18px;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .coming-soon {
            text-align: center;
            padding: 120px 40px;
        }

        .emoji {
            font-size: 120px;
            margin-bottom: 32px;
        }

        /* Hide navigation when in modal */
        .in-modal .nav-header {
            display: none !important;
        }

        .in-modal .case-study-layout {
            margin-top: 0 !important;
        }
    </style>
</head>
<body>
    <div class="coming-soon">
        <div class="emoji">💰</div>
        <h1>Fully Paid Lending</h1>
        <p>This case study is currently being prepared.</p>
        <p>Content coming soon...</p>
    </div>

    <script>
        // Detect if in iframe (modal) and add class to hide nav
        if (window.self !== window.top) {
            document.body.classList.add('in-modal');
        }

        // Apply theme from localStorage
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'dark';

        if (savedTheme === 'light') {
            html.setAttribute('data-theme', 'light');
        }
    </script>
</body>
</html>
